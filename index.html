<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pollen</title>
    <meta name="description" content="Pollinate your forms. Capture once, fill anywhere." />
    <link rel="icon" type="image/svg+xml" href="/assets/pollen.svg" />
    <script>
      (function () {
        var saved = null;
        try { saved = localStorage.getItem("pollen-lang"); } catch (_) {}
        var nav = (navigator.language || navigator.userLanguage || "en").toLowerCase();
        var lang = saved || (nav.indexOf("fr") === 0 ? "fr" : "en");
        location.replace("/" + lang + "/");
      })();
    </script>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #fffbeb;
        color: #78350f;
      }
      .fallback {
        text-align: center;
        padding: 24px;
      }
      .fallback a {
        color: #b45309;
        margin: 0 8px;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="fallback">
        <p>Pollen — <a href="/en/">English</a> · <a href="/fr/">Français</a></p>
      </div>
    </noscript>
  </body>
</html>
