<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pollen logo — "Capture once, pollinate everywhere."

  Concept: a central grain of pollen with six particles drifting outward,
  evoking cross-pollination between forms/sites. Warm amber gradient reads
  as "natural, organic, friendly"; the particle motif is visually distinct
  at 16×16 (Chrome Web Store icon size) and scales cleanly up to 1024+.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img"
     aria-label="Pollen">
  <defs>
    <!-- Warm amber→gold→honey gradient on the background tile -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <!-- Soft cream gradient on the central grain -->
    <radialGradient id="grain" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#fffbeb"/>
      <stop offset="55%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
    <!-- Glow for particles -->
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Rounded-square tile (Chrome extension icon shape) -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Thin inner highlight ring for depth -->
  <rect x="6" y="6" width="116" height="116" rx="24" ry="24"
        fill="none" stroke="#fffbeb" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Six orbiting pollen particles (drifting outward) -->
  <!-- radius positions placed at angles 0, 60, 120, 180, 240, 300 from centre (64,64) -->
  <g fill="url(#grain)">
    <circle cx="64"  cy="20"  r="6"   filter="url(#soft)" opacity="0.98"/>
    <circle cx="102" cy="42"  r="5"   filter="url(#soft)" opacity="0.88"/>
    <circle cx="102" cy="86"  r="4"   filter="url(#soft)" opacity="0.78"/>
    <circle cx="64"  cy="108" r="5.5" filter="url(#soft)" opacity="0.95"/>
    <circle cx="26"  cy="86"  r="5"   filter="url(#soft)" opacity="0.85"/>
    <circle cx="26"  cy="42"  r="4"   filter="url(#soft)" opacity="0.78"/>
  </g>

  <!-- Central grain (the "source") -->
  <circle cx="64" cy="64" r="22" fill="url(#grain)"/>
  <!-- Subtle inner speck for texture / focal point -->
  <circle cx="58" cy="58" r="5" fill="#fef3c7" opacity="0.7"/>
</svg>
